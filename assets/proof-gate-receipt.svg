<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">IdemGate duplicate storm proof receipt</title>
  <desc id="desc">One hundred duplicate Stripe events pass through DynamoDB conditional writes, resulting in one charge, ninety-nine blocked duplicates, a CloudWatch metric of ninety-nine, and a signed GO evidence bundle.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#0b2034"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="630" rx="32" fill="url(#bg)"/>
  <path d="M0 130H1200M0 260H1200M0 390H1200M0 520H1200M200 0V630M400 0V630M600 0V630M800 0V630M1000 0V630" stroke="#37d7ff" stroke-opacity=".035"/>
  <text x="70" y="78" fill="#37d7ff" font-family="Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="3">PROOF GATE RESULTS — RECORDED, NOT CLAIMED</text>
  <text x="70" y="120" fill="#f5faff" font-family="Arial, sans-serif" font-size="30" font-weight="800">Duplicate Storm · IG-ATTACK-001</text>
  <rect x="977" y="65" width="150" height="58" rx="29" fill="#35e0a1" fill-opacity=".12" stroke="#35e0a1" stroke-opacity=".55"/>
  <text x="1052" y="102" text-anchor="middle" fill="#35e0a1" font-family="Arial, sans-serif" font-size="22" font-weight="800">PASS</text>

  <g font-family="Arial, sans-serif">
    <rect x="70" y="175" width="230" height="190" rx="18" fill="#0b1727" stroke="#1b405d"/>
    <text x="95" y="208" fill="#37d7ff" font-size="12" font-weight="700" letter-spacing="2">INPUT</text>
    <text x="95" y="260" fill="#ffbf3f" font-size="40" font-weight="800">100x</text>
    <text x="95" y="297" fill="#f5faff" font-size="20" font-weight="700">same Stripe event</text>
    <text x="95" y="329" fill="#98aec4" font-family="monospace" font-size="14">evt_01JY4M3G</text>

    <text x="325" y="282" fill="#ffbf3f" font-size="35" font-weight="800">→</text>

    <rect x="370" y="175" width="230" height="190" rx="18" fill="#0b1727" stroke="#1b405d"/>
    <text x="395" y="208" fill="#37d7ff" font-size="12" font-weight="700" letter-spacing="2">AWS CONTROL</text>
    <text x="395" y="253" fill="#f5faff" font-size="19" font-weight="700">DynamoDB</text>
    <text x="395" y="282" fill="#f5faff" font-size="19" font-weight="700">TransactWriteItems</text>
    <text x="395" y="329" fill="#98aec4" font-family="monospace" font-size="14">idemgate-prod-ledger</text>

    <text x="625" y="282" fill="#ffbf3f" font-size="35" font-weight="800">→</text>

    <rect x="670" y="175" width="230" height="190" rx="18" fill="#0b1727" stroke="#1b405d"/>
    <text x="695" y="208" fill="#37d7ff" font-size="12" font-weight="700" letter-spacing="2">RECORDED RESULT</text>
    <text x="695" y="254" fill="#35e0a1" font-size="25" font-weight="800">1 SUCCEEDED</text>
    <text x="695" y="289" fill="#f5faff" font-size="20" font-weight="700">99 BLOCKED</text>
    <text x="695" y="329" fill="#98aec4" font-family="monospace" font-size="14">1 charge · 0 duplicates</text>

    <text x="925" y="282" fill="#ffbf3f" font-size="35" font-weight="800">→</text>

    <rect x="970" y="175" width="160" height="190" rx="18" fill="#0b1727" stroke="#37d7ff" filter="url(#glow)"/>
    <text x="995" y="208" fill="#37d7ff" font-size="12" font-weight="700" letter-spacing="2">CLOUDWATCH</text>
    <text x="995" y="257" fill="#f5faff" font-size="15" font-weight="700">DuplicateBlocked</text>
    <text x="995" y="280" fill="#f5faff" font-size="15" font-weight="700">Count</text>
    <text x="995" y="333" fill="#35e0a1" font-size="40" font-weight="800">= 99</text>
  </g>

  <rect x="70" y="415" width="1060" height="135" rx="18" fill="#030912" stroke="#1b405d"/>
  <text x="95" y="453" fill="#98aec4" font-family="monospace" font-size="15">$ idemgate gate --run idemgate-prod-us-east-1-20260610T084215Z-a91c7e2</text>
  <text x="95" y="489" fill="#35e0a1" font-family="monospace" font-size="16" font-weight="700">PASS  sent=100 · succeeded=1 · duplicate_blocked=99 · charge_count=1</text>
  <text x="95" y="525" fill="#35e0a1" font-family="monospace" font-size="16" font-weight="700">GO    safety_violations=0 · lost_accepted_intents=0 · signed + Object Locked</text>
  <text x="70" y="594" fill="#98aec4" font-family="Arial, sans-serif" font-size="13">SAMPLE RECORDED RUN · demonstrates the output contract · a live deployment must produce its own verified receipt</text>
</svg>
